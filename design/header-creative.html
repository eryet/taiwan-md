<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taiwan.md</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --container-wide: 1380px;
        /* Taiwan Chic: Emerald (Jade) — Pantone 3295 C palette */
        --green-deep: #004d40;
        --green-primary: #006352;
        --green-mid: #007864;
        --green-light: #00997d;
        --green-accent: #4fd1b0;
        --jade-soft: #e0f2ef;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family:
          'Noto Sans TC',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #0a0a0a;
        color: white;
        overflow-x: hidden;
      }

      /* =============================================
     HEADER
  ============================================= */
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(20px) saturate(1.8);
        -webkit-backdrop-filter: blur(20px) saturate(1.8);
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 1px 20px rgba(0, 0, 0, 0.04);
      }

      .header-inner {
        max-width: var(--container-wide);
        margin: 0 auto;
        padding: 0 clamp(1rem, 2vw, 2rem);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        height: 56px;
      }

      /* Logo */
      .logo {
        text-decoration: none;
        font-size: 1.3rem;
        font-weight: 700;
        font-family: 'Noto Serif TC', serif;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: all 0.3s;
        position: relative;
        color: #1a1a2e;
      }
      .logo:hover {
        transform: translateY(-1px);
      }
      .logo-dot {
        color: var(--green-mid);
        font-family: 'Noto Sans TC', sans-serif;
        font-weight: 600;
        opacity: 0.7;
      }

      /* Nav */
      .nav-desktop {
        display: flex;
        gap: 0.15rem;
        margin-left: auto;
        align-items: center;
      }
      .nav-link {
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        color: #475569;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.4rem 0.55rem;
        white-space: nowrap;
        border-radius: 8px;
        position: relative;
        letter-spacing: -0.01em;
      }
      .nav-link:hover {
        color: #1a1a2e;
      }
      .nav-link::after {
        content: '';
        position: absolute;
        bottom: 4px;
        left: 50%;
        width: 0;
        height: 2px;
        background: var(--green-mid);
        border-radius: 1px;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        transform: translateX(-50%);
      }
      .nav-link:hover::after {
        width: 80%;
      }
      .dropdown-arrow {
        font-size: 0.55em;
        color: #94a3b8;
        transition: all 0.25s;
        margin-left: 1px;
      }

      /* Nav separator */
      .nav-sep {
        width: 1px;
        height: 16px;
        background: currentColor;
        opacity: 0.12;
        margin: 0 0.2rem;
        flex-shrink: 0;
      }

      /* Dropdown */
      .nav-dropdown {
        position: relative;
      }
      .dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        opacity: 0;
        visibility: hidden;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 14px;
        padding: 0.5rem 0;
        min-width: 180px;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.12),
          0 0 0 1px rgba(0, 0, 0, 0.03);
        z-index: 1000;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .nav-dropdown:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
      }
      .nav-dropdown:hover .dropdown-arrow {
        transform: rotate(180deg);
      }
      .dropdown-item {
        display: block;
        padding: 0.5rem 1.1rem;
        color: #334155;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        white-space: nowrap;
        transition: all 0.15s;
        border-radius: 0;
      }
      .dropdown-item:hover {
        background: rgba(42, 100, 20, 0.06);
        color: var(--green-deep);
      }
      .dropdown-section-header {
        font-weight: 600;
        color: var(--green-deep);
        font-size: 0.88rem;
      }
      .dropdown-divider {
        height: 1px;
        background: rgba(0, 0, 0, 0.06);
        margin: 0.35rem 0.9rem;
      }

      /* Search button */
      .search-toggle {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.5rem;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: transparent;
        cursor: pointer;
        transition: all 0.2s;
        flex-shrink: 0;
        color: #64748b;
        font-family: inherit;
      }
      .search-toggle:hover {
        color: #1a1a2e;
        border-color: rgba(0, 0, 0, 0.15);
        background: rgba(0, 0, 0, 0.03);
      }
      .search-toggle kbd {
        font-size: 0.6rem;
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
        font-family: inherit;
        font-weight: 600;
        background: #f1f5f9;
        color: #94a3b8;
        border: 1px solid #e2e8f0;
        line-height: 1.3;
      }

      /* GitHub link */
      .gh-link {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.4rem;
        border-radius: 8px;
        transition: all 0.2s;
        text-decoration: none;
      }
      .gh-link svg {
        width: 18px;
        height: 18px;
        transition: all 0.2s;
        color: #94a3b8;
      }
      .gh-link:hover svg {
        color: #334155;
      }
      .gh-link:hover {
        transform: scale(1.1);
      }

      /* Lang toggle */
      .lang-toggle {
        display: flex;
        gap: 2px;
        border-radius: 10px;
        padding: 3px;
        flex-shrink: 0;
        transition: all 0.3s;
        background: #f1f5f9;
        border: 1px solid rgba(0, 0, 0, 0.06);
      }
      .lang-btn {
        padding: 0.3rem 0.6rem;
        text-decoration: none;
        font-size: 0.78rem;
        font-weight: 600;
        color: #64748b;
        border-radius: 7px;
        transition: all 0.2s;
        min-width: 36px;
        text-align: center;
      }
      .lang-btn:hover {
        background: rgba(0, 0, 0, 0.05);
        color: #334155;
      }
      .lang-btn.active {
        background: var(--green-mid);
        color: white;
        box-shadow: 0 2px 6px rgba(45, 80, 22, 0.25);
      }

      /* Hamburger */
      .menu-toggle {
        display: none;
        align-items: center;
        justify-content: center;
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.2rem;
        flex-shrink: 0;
        transition: all 0.2s;
        color: #334155;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }

      /* Mobile nav */
      .nav-mobile {
        display: none;
      }
      .nav-mobile.open {
        display: flex;
      }

      /* =============================================
     MEDIUM TIGHTEN
  ============================================= */
      @media (max-width: 1200px) {
        .header-inner {
          gap: 0.5rem;
        }
        .nav-desktop {
          gap: 0.05rem;
        }
        .nav-link {
          font-size: 0.78rem;
          padding: 0.35rem 0.4rem;
        }
        .nav-sep {
          margin: 0 0.1rem;
        }
        .search-toggle kbd {
          display: none;
        }
      }

      /* =============================================
     MOBILE
  ============================================= */
      @media (max-width: 768px) {
        .header-inner {
          padding: 0 1rem;
          gap: 0.4rem;
          height: 52px !important;
        }
        .logo {
          font-size: 1.1rem;
          margin-right: auto;
        }
        .nav-desktop {
          display: none;
        }
        .menu-toggle {
          display: flex;
          order: 4;
        }
        .search-toggle {
          order: 2;
        }
        .search-toggle kbd {
          display: none;
        }
        .lang-toggle {
          order: 3;
        }
        .lang-btn {
          padding: 0.3rem 0.5rem;
          font-size: 0.75rem;
          min-width: unset;
        }
        .nav-mobile {
          position: absolute;
          top: 100%;
          left: 0.75rem;
          right: 0.75rem;
          margin-top: 0.35rem;
          background: rgba(255, 255, 255, 0.99);
          backdrop-filter: blur(20px);
          flex-direction: column;
          padding: 0.8rem 1rem 1rem;
          gap: 0;
          border: 1px solid rgba(0, 0, 0, 0.08);
          border-radius: 18px;
          box-shadow: 0 18px 42px rgba(15, 23, 42, 0.14);
        }
        .nav-mobile .nav-link {
          padding: 0.85rem 0.2rem;
          font-size: 0.95rem;
          color: #334155;
          border-bottom: 1px solid #f1f5f9;
          border-radius: 0;
        }
        .nav-mobile .nav-link::after {
          display: none;
        }
        .mobile-lang-toggle {
          padding: 1rem 0 0.5rem;
          border-top: 1px solid #e2e8f0;
        }
        .mobile-lang-label {
          font-size: 0.85rem;
          color: #64748b;
          font-weight: 500;
          display: block;
          margin-bottom: 0.75rem;
        }
        .mobile-lang-buttons {
          display: flex;
          gap: 0.5rem;
        }
        .mobile-lang-btn {
          flex: 1;
          padding: 0.6rem;
          text-align: center;
          text-decoration: none;
          color: #475569;
          background: #f8fafc;
          border: 1px solid #e2e8f0;
          border-radius: 6px;
          font-size: 0.9rem;
          font-weight: 600;
          transition: all 0.2s;
        }
        .mobile-lang-btn.active {
          background: var(--green-mid);
          color: white;
          border-color: var(--green-mid);
        }
      }

      /* =============================================
     HERO SECTION (for context)
  ============================================= */
      .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 6rem 2rem;
        background: linear-gradient(
          170deg,
          #001a14 0%,
          var(--green-deep) 25%,
          var(--green-primary) 50%,
          var(--green-mid) 75%,
          #005f56 100%
        );
        overflow: hidden;
      }
      .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 600px 400px at 20% 30%,
            rgba(79, 209, 176, 0.1) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 500px 350px at 75% 60%,
            rgba(0, 120, 100, 0.08) 0%,
            transparent 70%
          );
      }
      .hero::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 200px;
        background: linear-gradient(
          to top,
          rgba(10, 10, 10, 1) 0%,
          transparent 100%
        );
      }
      .hero-content {
        position: relative;
        z-index: 2;
        max-width: 700px;
      }
      .hero-title {
        font-family: 'Noto Serif TC', serif;
        font-size: clamp(3rem, 8vw, 5.5rem);
        font-weight: 700;
        line-height: 1.05;
        margin-bottom: 1.5rem;
        letter-spacing: -0.02em;
      }
      .hero-title .dot {
        color: var(--green-accent);
      }
      .hero-subtitle {
        font-size: clamp(1rem, 2.5vw, 1.3rem);
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.7;
        margin-bottom: 2.5rem;
        font-weight: 400;
      }
      .hero-cta {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.85rem 2rem;
        background: white;
        color: var(--green-deep);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: 12px;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .hero-cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      }
      .hero-cta svg {
        transition: transform 0.3s;
      }
      .hero-cta:hover svg {
        transform: translateX(3px);
      }

      /* =============================================
     BODY CONTENT (for scroll testing)
  ============================================= */
      .content-section {
        max-width: 800px;
        margin: 0 auto;
        padding: 6rem 2rem;
      }
      .content-section h2 {
        font-family: 'Noto Serif TC', serif;
        font-size: 2rem;
        margin-bottom: 1.5rem;
        color: #e2e8f0;
      }
      .content-section p {
        color: #94a3b8;
        line-height: 1.8;
        font-size: 1.05rem;
        margin-bottom: 1rem;
      }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1.25rem;
        margin-top: 2rem;
      }
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        padding: 1.5rem;
        transition: all 0.3s;
      }
      .card:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
      }
      .card-emoji {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
        display: block;
      }
      .card-title {
        font-weight: 600;
        color: #e2e8f0;
        margin-bottom: 0.4rem;
        font-size: 0.95rem;
      }
      .card-desc {
        color: #64748b;
        font-size: 0.85rem;
        line-height: 1.5;
      }

      /* Floating lang switcher for demo */
      .demo-switcher {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 999;
        display: flex;
        gap: 4px;
        background: rgba(30, 30, 30, 0.9);
        backdrop-filter: blur(10px);
        padding: 4px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .demo-switcher button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
    </style>
  </head>

    <script>
      // ===== Language switcher =====
      let currentLang = 'zh';

      function switchLang(lang) {
        currentLang = lang;
        // Text content
        document.querySelectorAll('[data-zh]').forEach((el) => {
          el.textContent = el.getAttribute('data-' + lang);
        });
        // Floating switcher
        document.getElementById('btn-zh').style.background =
          lang === 'zh' ? 'var(--green-mid)' : 'transparent';
        document.getElementById('btn-zh').style.color =
          lang === 'zh' ? 'white' : '#94a3b8';
        document.getElementById('btn-en').style.background =
          lang === 'en' ? 'var(--green-mid)' : 'transparent';
        document.getElementById('btn-en').style.color =
          lang === 'en' ? 'white' : '#94a3b8';
        // Header toggle
        document
          .getElementById('header-zh')
          .classList.toggle('active', lang === 'zh');
        document
          .getElementById('header-en')
          .classList.toggle('active', lang === 'en');
        // Mobile toggle
        document
          .getElementById('mob-zh')
          .classList.toggle('active', lang === 'zh');
        document
          .getElementById('mob-en')
          .classList.toggle('active', lang === 'en');
      }

      switchLang('zh');
