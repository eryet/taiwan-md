<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="jade-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="25%" stop-color="#006352"/>
      <stop offset="50%" stop-color="#007864"/>
      <stop offset="75%" stop-color="#00997d"/>
      <stop offset="100%" stop-color="#4fd1b0"/>
    </linearGradient>
  </defs>

  <rect width="960" height="520" fill="#fafafa" rx="16"/>

  <text x="480" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Taiwan Chic: Emerald (Jade) Color Palette</text>
  <text x="480" y="74" text-anchor="middle" font-size="13" fill="#64748b">Based on Pantone 3295 C | Ministry of Culture | Taiwan</text>

  <rect x="40" y="110" width="140" height="140" rx="14" fill="#004d40"/>
  <text x="110" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#b2dfdb">Text</text>
  <text x="110" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#b2dfdb">Backgrounds</text>
  <text x="110" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Deep Jade</text>
  <text x="110" y="298" text-anchor="middle" font-size="11" fill="#64748b">#004d40</text>
  <text x="110" y="314" text-anchor="middle" font-size="10" fill="#94a3b8">rgb(0, 77, 64)</text>
  <text x="110" y="330" text-anchor="middle" font-size="10" fill="#94a3b8">green-deep</text>

  <rect x="200" y="110" width="140" height="140" rx="14" fill="#006352"/>
  <text x="270" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#b2dfdb">Dropdowns</text>
  <text x="270" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Primary Jade</text>
  <text x="270" y="298" text-anchor="middle" font-size="11" fill="#64748b">#006352</text>
  <text x="270" y="314" text-anchor="middle" font-size="10" fill="#94a3b8">rgb(0, 99, 82)</text>
  <text x="270" y="330" text-anchor="middle" font-size="10" fill="#94a3b8">green-primary</text>

  <rect x="360" y="100" width="160" height="160" rx="16" fill="#007864" stroke="#4fd1b0" stroke-width="3"/>
  <text x="440" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="white">Pantone</text>
  <text x="440" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="white">3295 C</text>
  <text x="440" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#007864">Formosan Green</text>
  <text x="440" y="310" text-anchor="middle" font-size="12" fill="#1e293b">&#x7FE1;&#x7FE0;&#x7DA0; &#xB7; &#x81FA;&#x7063;&#x7FE0;&#x7389;</text>
  <text x="440" y="328" text-anchor="middle" font-size="11" fill="#64748b">#007864</text>
  <text x="440" y="344" text-anchor="middle" font-size="10" fill="#94a3b8">rgb(0, 120, 100)</text>
  <text x="440" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">green-mid</text>

  <rect x="540" y="110" width="140" height="140" rx="14" fill="#00997d"/>
  <text x="610" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="white">Hovers</text>
  <text x="610" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Light Jade</text>
  <text x="610" y="298" text-anchor="middle" font-size="11" fill="#64748b">#00997d</text>
  <text x="610" y="314" text-anchor="middle" font-size="10" fill="#94a3b8">rgb(0, 153, 125)</text>
  <text x="610" y="330" text-anchor="middle" font-size="10" fill="#94a3b8">green-light</text>

  <rect x="700" y="110" width="140" height="140" rx="14" fill="#4fd1b0"/>
  <text x="770" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#004d40">Highlights</text>
  <text x="770" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#004d40">Accents</text>
  <text x="770" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Jade Glow</text>
  <text x="770" y="298" text-anchor="middle" font-size="11" fill="#64748b">#4fd1b0</text>
  <text x="770" y="314" text-anchor="middle" font-size="10" fill="#94a3b8">rgb(79, 209, 176)</text>
  <text x="770" y="330" text-anchor="middle" font-size="10" fill="#94a3b8">green-accent</text>

  <rect x="40" y="380" width="400" height="50" rx="10" fill="#e0f2ef" stroke="#b2dfdb" stroke-width="1"/>
  <text x="240" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#004d40">Jade Soft | #e0f2ef | rgb(224, 242, 239) | jade-soft</text>

  <rect x="40" y="450" width="880" height="14" rx="7" fill="url(#jade-grad)"/>

  <text x="480" y="492" text-anchor="middle" font-size="11" fill="#94a3b8">Source: Ministry of Culture, Three Iconic Colors of Taiwan (moc.gov.tw)</text>
</svg>
