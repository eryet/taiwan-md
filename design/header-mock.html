<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header Mock — Taiwan.md</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --container-wide: 1380px;
        --space-page-x: clamp(1rem, 2vw, 2rem);
        --border-soft: 1px solid rgba(0, 0, 0, 0.06);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          'Noto Sans TC',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(
          180deg,
          #2d5016 0%,
          #4a7c28 30%,
          #6b9b3a 60%,
          #87ceeb 100%
        );
        min-height: 200vh;
      }

      /* =============================================
     HEADER
  ============================================= */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }
      .header-inner {
        max-width: var(--container-wide);
        margin: 0 auto;
        padding: 0 var(--space-page-x);
        display: flex;
        align-items: center;
        gap: 1rem;
        height: 56px;
      }
      .logo {
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 1.25rem;
        font-weight: 700;
        color: #1a1a2e;
        flex-shrink: 0;
      }
      .logo-dot {
        color: #3b82f6;
      }

      /* Nav */
      .nav-desktop {
        display: flex;
        gap: 0.2rem;
        margin-left: auto;
        align-items: center;
      }
      .nav-dropdown {
        position: relative;
      }
      .dropdown-arrow {
        font-size: 0.6em;
        opacity: 0.4;
        margin-left: 1px;
        transition: transform 0.2s;
      }
      .dropdown-menu {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(167, 196, 160, 0.3);
        border-radius: 12px;
        padding: 0.4rem 0;
        min-width: 170px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
        z-index: 1000;
      }
      .nav-dropdown:hover .dropdown-menu {
        display: block;
      }
      .nav-dropdown:hover .dropdown-arrow {
        transform: rotate(180deg);
      }
      .dropdown-item {
        display: block;
        padding: 0.45rem 1.1rem;
        color: #2d5016;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        white-space: nowrap;
        transition: background 0.15s;
      }
      .dropdown-item:hover {
        background: rgba(74, 124, 89, 0.08);
      }
      .dropdown-section-header {
        font-weight: 600;
        color: #1a3a0a;
        font-size: 0.9rem;
      }
      .dropdown-divider {
        height: 1px;
        background: rgba(74, 124, 89, 0.12);
        margin: 0.3rem 0.8rem;
      }

      .nav-link {
        text-decoration: none;
        color: #475569;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        position: relative;
        padding: 0.45rem 0.6rem;
        white-space: nowrap;
        border-radius: 8px;
        letter-spacing: -0.01em;
      }
      .nav-link:hover {
        color: #1a1a2e;
        background: rgba(148, 163, 184, 0.1);
      }
      .nav-link.gh {
        padding: 0.45rem;
      }
      .nav-link.gh svg {
        opacity: 0.6;
      }
      .nav-link.gh:hover svg {
        opacity: 1;
      }

      .nav-sep {
        width: 1px;
        height: 18px;
        background: #e2e8f0;
        margin: 0 0.15rem;
        flex-shrink: 0;
      }

      /* Search */
      .search-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        padding: 0.4rem;
        cursor: pointer;
        color: #64748b;
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .search-toggle:hover {
        color: #1a1a2e;
        border-color: rgba(0, 0, 0, 0.15);
        background: rgba(0, 0, 0, 0.03);
      }

      /* Lang toggle */
      .lang-toggle {
        display: flex;
        gap: 2px;
        background: rgba(241, 245, 249, 0.95);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 10px;
        padding: 3px;
        flex-shrink: 0;
      }
      .lang-btn {
        padding: 0.35rem 0.7rem;
        text-decoration: none;
        color: #475569;
        font-size: 0.8rem;
        font-weight: 600;
        border-radius: 7px;
        transition: all 0.2s;
        min-width: 38px;
        text-align: center;
      }
      .lang-btn:hover {
        background: rgba(59, 130, 246, 0.08);
        color: #3b82f6;
      }
      .lang-btn.active {
        background: #3b82f6;
        color: white;
        box-shadow: 0 2px 4px rgba(59, 130, 246, 0.25);
      }

      /* Hamburger */
      .menu-toggle {
        display: none;
        background: none;
        border: none;
        font-size: 1.4rem;
        cursor: pointer;
        color: #334155;
        padding: 0.25rem;
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 999px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        align-items: center;
        justify-content: center;
      }

      /* Mobile nav */
      .nav-mobile {
        display: none;
      }
      .nav-mobile.open {
        display: flex;
      }

      .gh-icon {
        width: 16px;
        height: 16px;
      }

      /* =============================================
     MEDIUM — tighten nav so EN labels fit
  ============================================= */
      @media (max-width: 1200px) {
        .header-inner {
          gap: 0.6rem;
        }
        .nav-desktop {
          gap: 0.1rem;
        }
        .nav-link {
          font-size: 0.8rem;
          padding: 0.4rem 0.45rem;
        }
        .nav-sep {
          margin: 0 0.05rem;
        }
        .lang-btn {
          padding: 0.3rem 0.55rem;
          font-size: 0.78rem;
        }
      }

      /* =============================================
     MOBILE — hamburger at 768px
  ============================================= */
      @media (max-width: 768px) {
        .header-inner {
          padding: 0 1rem;
          gap: 0.4rem;
          height: 52px;
        }
        .logo {
          font-size: 1.05rem;
          flex-shrink: 0;
          margin-right: auto;
        }
        .nav-desktop {
          display: none;
        }
        .menu-toggle {
          display: flex;
          order: 4;
          flex-shrink: 0;
        }
        .search-toggle {
          order: 2;
          flex-shrink: 0;
        }
        .lang-toggle {
          order: 3;
          flex-shrink: 0;
        }
        .lang-btn {
          padding: 0.35rem 0.55rem;
          font-size: 0.8rem;
          min-width: unset;
        }
        .nav-mobile {
          position: absolute;
          top: 100%;
          left: 0.75rem;
          right: 0.75rem;
          margin-top: 0.35rem;
          background: rgba(255, 255, 255, 0.99);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          flex-direction: column;
          padding: 0.8rem 1rem 1rem;
          gap: 0;
          border: 1px solid rgba(0, 0, 0, 0.08);
          border-radius: 18px;
          box-shadow: 0 18px 42px rgba(15, 23, 42, 0.14);
        }
        .nav-mobile .nav-link {
          padding: 0.85rem 0.2rem;
          font-size: 0.95rem;
          border-bottom: 1px solid #f1f5f9;
          border-radius: 0;
          background: transparent;
        }
        .mobile-lang-toggle {
          padding: 1rem 0 0.5rem;
          border-top: 1px solid #e2e8f0;
        }
        .mobile-lang-label {
          font-size: 0.85rem;
          color: #64748b;
          font-weight: 500;
          display: block;
          margin-bottom: 0.75rem;
        }
        .mobile-lang-buttons {
          display: flex;
          gap: 0.5rem;
        }
        .mobile-lang-btn {
          flex: 1;
          padding: 0.6rem;
          text-align: center;
          text-decoration: none;
          color: #475569;
          background: #f8fafc;
          border: 1px solid #e2e8f0;
          border-radius: 6px;
          font-size: 0.9rem;
          font-weight: 600;
          transition: all 0.2s;
        }
        .mobile-lang-btn.active {
          background: #3b82f6;
          color: white;
          border-color: #3b82f6;
        }
        .mobile-lang-btn:not(.active):hover {
          background: #e2e8f0;
        }
      }
    </style>
  </head>
  <body>
    <!-- =============================================
     LANG SWITCHER (floating)
============================================= -->
    <div
      id="lang-switcher"
      style="
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 999;
        display: flex;
        gap: 4px;
        background: white;
        padding: 4px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(0, 0, 0, 0.08);
      "
    >
      <button
        onclick="switchLang('zh')"
        id="btn-zh"
        style="
          padding: 0.5rem 1rem;
          border: none;
          border-radius: 8px;
          font-size: 0.85rem;
          font-weight: 600;
          cursor: pointer;
          background: #3b82f6;
          color: white;
        "
      >
        中文
      </button>
      <button
        onclick="switchLang('en')"
        id="btn-en"
        style="
          padding: 0.5rem 1rem;
          border: none;
          border-radius: 8px;
          font-size: 0.85rem;
          font-weight: 600;
          cursor: pointer;
          background: transparent;
          color: #475569;
        "
      >
        EN
      </button>

            <div class="dropdown-menu">

        <div class="lang-toggle">

            class="lang-btn active"

              event.preventDefault();
              switchLang('zh');

                switchLang('zh');

    <script>
      let currentLang = 'zh';

      function switchLang(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-zh]').forEach((el) => {
          el.textContent = el.getAttribute('data-' + lang);
        });
        // Update floating switcher
        document.getElementById('btn-zh').style.background =
          lang === 'zh' ? '#3b82f6' : 'transparent';
        document.getElementById('btn-zh').style.color =
          lang === 'zh' ? 'white' : '#475569';
        document.getElementById('btn-en').style.background =
          lang === 'en' ? '#3b82f6' : 'transparent';
        document.getElementById('btn-en').style.color =
          lang === 'en' ? 'white' : '#475569';
        // Update header toggle
        document
          .getElementById('header-zh')
          .classList.toggle('active', lang === 'zh');
        document
          .getElementById('header-en')
          .classList.toggle('active', lang === 'en');
        // Update mobile toggle
        document
          .getElementById('mob-zh')
          .classList.toggle('active', lang === 'zh');
        document
          .getElementById('mob-en')
          .classList.toggle('active', lang === 'en');
      }

      // Init
      switchLang('zh');
    </script>
